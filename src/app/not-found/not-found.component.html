<div
  className="page-error"
  style="
    position: relative;
    min-height: 100vh;
    background: var(--backgroundBody);
  "
>
  <div
    className="container"
    style="
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      display: grid;
      place-items: center;
      gap: 20px;
      width: 85%;
    "
  >
    <img
      class="error-img"
      style="width: 80%"
      src="assets/img/rolling-cat.webp"
      alt="rolling cat"
      width="80%"
      height="100%"
    />
    <p
      className="error-title"
      style="
        font-size: 1.6rem;
        font-weight: 700;
        text-align: center;
        letter-spacing: 4px;
      "
    >
      Page not Found
    </p>
    <p
      className="error-message"
      style="
        font-size: 1.2rem;
        text-align: center;
        width: 50%;
        line-height: 1.3;
      "
    >
      Try another page or Enjoy this cat
    </p>
  </div>
</div>
