<nav class="navbar" [class.active]="isShowMenu">
  <a
    class="item"
    routerLink="/yugioh"
    routerLinkActive="active"
    (click)="isShowMenu = false"
  >
    Home
  </a>
  <div class="menu">
    <button mat-button [matMenuTriggerFor]="menu">Categories</button>
    <mat-menu #menu="matMenu">
      <a
        class="item"
        mat-menu-item
        *ngFor="let item of menuData"
        [routerLink]="item.url"
        (click)="isShowMenu = false"
      >
        {{ item.name }}
      </a>
    </mat-menu>
  </div>
  <!-- <a class="item" routerLink="/yugioh/type-card/spell" routerLinkActive="active">TypeCard</a>
  <a class="item" routerLink="/yugioh/card/dark magician" routerLinkActive="active">Card</a>
  <a class="item" routerLink="/pokemon" routerLinkActive="active">Pokemon</a> -->
  <button
    type="button"
    class="btn-close"
    *ngIf="isShowMenu"
    (click)="toggleShowMenu()"
  >
    <mat-icon>close</mat-icon>
  </button>
</nav>
<button
  class="menu-burger"
  mat-icon-button
  aria-label="open modal of menu burger"
  (click)="toggleShowMenu()"
>
  <mat-icon>menu</mat-icon>
</button>
